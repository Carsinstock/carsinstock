<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}CarsInStock{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Minimal, safe styling -->
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f7f7f7;
            color: #222;
        }
        header {
            background: #111;
            color: white;
            padding: 16px 24px;
            font-size: 20px;
            font-weight: bold;
        }
        main {
            padding: 40px 24px;
        }
    </style>
</head>
<body>

<header>
    CarsInStock
</header>

<main>
    {% block content %}{% endblock %}
</main>

</body>
</html>
