<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}CarsInStock{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="site-header">
  <div class="nav-container">
    <div class="logo">
      <a href="/">CarsInStock</a>
    </div>
    <nav class="nav-links">
      <a href="/search">Search Cars</a>
      <a href="/salespeople">Salespeople</a>
      <a href="/customers">Customers</a>
      <a href="/disclosure">Disclosure</a>
      <a href="/login">Login</a>
      <a href="/register" class="btn-outline">Register</a>
    </nav>
  </div>
</header>

<main class="site-main">
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  © 2026 CarsInStock. Real Cars. Real Salespeople.
</footer>

</body>
</html>
