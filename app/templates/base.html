<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CarsInStock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f6f8;
        }
        header {
            background: #111;
            color: white;
            padding: 15px 20px;
        }
        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }
        .container {
            padding: 30px;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #777;
        }
    </style>
</head>
<body>

<header>
<nav>
  <a href="{{ url_for('main.index') }}">CarsInStock</a>

  {% if current_user.is_authenticated %}
    <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
    <a href="{{ url_for('main.logout') }}">Logout</a>
  {% else %}
    <a href="{{ url_for('main.login') }}">Login</a>
    <a href="{{ url_for('main.register') }}">Sign up</a>
  {% endif %}
</nav>

</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    © 2025 CarsInStock
</footer>

</body>
</html>
