<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
<link rel="shortcut icon" href="/static/favicon.ico">
<title>{% block title %}MyCarReferral — Start your own car referral business{% endblock %}</title>
{% block meta %}<meta name="description" content="Connect car shoppers to a rep you trust. Get a thank-you gift when the deal closes. No license, no inventory, no upfront cost. Free to join.">{% endblock %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">

<style>
/* ============ RESET ============ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
img, svg { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }

/* ============ DESIGN TOKENS ============ */
:root {
  --bg: #FAFAF9;
  --bg-warm: #F4F4F2;
  --bg-card: #FFFFFF;
  --bg-dark: #162334;
  --bg-darker: #0B1421;
  --bg-gold-tint: #E8F9EF;
  --bg-green-tint: #E8F9EF;
  --bg-coral-tint: #FFEDEA;

  --text: #1E293B;
  --text-muted: #5B6474;
  --text-light: #9AA1AE;
  --text-on-dark: #FFFFFF;
  --text-on-dark-muted: #94A3B8;

  --gold: #00C851;
  --gold-dark: #00A344;
  --green: #00C851;
  --green-dark: #00A344;
  --green-deep: #065F46;
  --coral: #FF6B5A;
  --coral-dark: #D04A3B;

  --border: #E5E7EB;
  --border-light: #F0F1F3;

  --font-serif: 'Space Grotesk', 'Inter', -apple-system, sans-serif;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04), 0 2px 8px rgba(15, 23, 42, 0.03);
  --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.05), 0 8px 32px rgba(15, 23, 42, 0.04);
  --shadow-green: 0 6px 18px rgba(25, 179, 107, 0.30), 0 2px 4px rgba(25, 179, 107, 0.20);
  --shadow-coral: 0 6px 18px rgba(255, 107, 90, 0.28);
}

/* ============ BASE ============ */
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  font-size: 16px;
}

.container { width: 100%; max-width: 1140px; margin: 0 auto; padding: 0 24px; }
.container-narrow { width: 100%; max-width: 760px; margin: 0 auto; padding: 0 24px; }

/* ============ LOGO ============ */
.logo {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1;
}
.logo .logo-mark { color: var(--gold); font-style: italic; }
.logo-lockup {
  display: flex;
  flex-direction: column;
  gap: 2px;
  line-height: 1;
}
.logo-tagline {
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 500;
  color: var(--gold-dark);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}

/* ============ NAV ============ */
.nav {
  padding: 18px 0;
  background: rgba(250, 250, 249, 0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-inner { display: flex; align-items: center; justify-content: space-between; }
.nav-actions { display: flex; align-items: center; gap: 18px; font-size: 14px; }
.nav-link { color: var(--text-muted); font-weight: 500; }
.nav-link:hover { color: var(--text); }
.nav-cta {
  padding: 9px 18px;
  background: var(--green);
  color: var(--text-on-dark);
  border-radius: 8px;
  border: 0;
  font-weight: 500;
  font-size: 14px;
  box-shadow: var(--shadow-green);
  transition: transform 0.15s, box-shadow 0.15s;
}
.nav-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(25, 179, 107, 0.38); }

/* ============ BUTTONS ============ */
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 16px 28px;
  background: var(--green);
  color: var(--text-on-dark);
  border: 0;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 500;
  box-shadow: var(--shadow-green);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(25, 179, 107, 0.38); }
.btn-primary .ti { font-size: 18px; }

.btn-outline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 16px 24px;
  background: transparent;
  color: var(--text);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 16px;
  font-weight: 500;
  transition: border-color 0.15s, background 0.15s;
}
.btn-outline:hover { border-color: var(--text); background: var(--bg-card); }

.cta-microcopy { margin-top: 12px; font-size: 13px; color: var(--text-light); }

/* ============ PILL ============ */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 13px;
  background: var(--bg-coral-tint);
  border: 1px solid var(--coral);
  border-radius: 100px;
  font-size: 11px;
  font-weight: 500;
  color: var(--coral-dark);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.pill.pill-green {
  background: var(--bg-green-tint);
  border-color: var(--green);
  color: var(--green-deep);
}
.pill.pill-gold {
  background: var(--bg-gold-tint);
  border-color: var(--gold);
  color: var(--gold-dark);
}

/* ============ SECTION FRAME ============ */
.section { padding: 88px 0; position: relative; }
.section-white { background: var(--bg-card); }
.section-warm { background: var(--bg-warm); }
.section-dark { background: var(--bg-dark); color: var(--text-on-dark); }

.section-eyebrow {
  display: inline-block;
  font-size: 12px;
  font-weight: 500;
  color: var(--coral-dark);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.section-eyebrow.gold { color: var(--gold-dark); }
.section-eyebrow.green { color: var(--green-dark); }

.section-title {
  font-family: var(--font-serif);
  font-size: clamp(32px, 5vw, 44px);
  font-weight: 500;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 16px;
  max-width: 720px;
}
.section-title em { font-style: italic; color: var(--gold); font-weight: 500; }
.section-title em.green { color: var(--green); }
.section-title em.coral { color: var(--coral-dark); }

.section-subtitle {
  font-size: 18px;
  color: var(--text-muted);
  max-width: 620px;
  line-height: 1.5;
  margin-bottom: 56px;
}
.section-dark .section-eyebrow { color: var(--coral); }
.section-dark .section-title { color: var(--text-on-dark); }
.section-dark .section-subtitle { color: var(--text-on-dark-muted); }
</style>

{% block extra_head %}{% endblock %}
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
